# GCP configuration — edit values or run: cloudtek configure --cloud gcp
# Values are saved to ~/.cloudtek/configs/gcp.yaml on first configure run.

project: YOUR_GCP_PROJECT_ID
zone: us-central1-a
machine_type: n2-standard-2
disk_size: 50
network: default
subnetwork: ""
no_backups: true

credentials_env: GCP_CREDENTIALS
ssh_key_env: GCP_SSH_PRIVATE_KEY

profiles:
  debian:
    ssh_user: YOUR_SSH_USER
    tags:
      - test-debian-vm
  flatcar:
    ssh_user: core
    tags:
      - test-flatcar-vm

image_prefixes:
  example-service: example-prefix

service_profiles:
  example-service: debian
