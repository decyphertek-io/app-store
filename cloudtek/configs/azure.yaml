# Azure configuration — edit values or run: cloudtek configure --cloud azure
# Values are saved to ~/.cloudtek/configs/azure.yaml on first configure run.

resource_group: YOUR_RESOURCE_GROUP
location: eastus
vm_size: Standard_B2s
disk_size: 50
no_backups: true

credentials_env:
  tenant_id: AZURE_TENANT_ID
  subscription_id: AZURE_SUBSCRIPTION_ID
  client_id: AZURE_CLIENT_ID
  client_secret: AZURE_CLIENT_SECRET
ssh_key_env: AZURE_SSH_PRIVATE_KEY

profiles:
  debian:
    ssh_user: YOUR_SSH_USER
    tags:
      - test-debian-vm

image_prefixes:
  example-service: example-prefix

service_profiles:
  example-service: debian
