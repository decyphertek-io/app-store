# AWS configuration — edit values or run: cloudtek configure --cloud aws
# Values are saved to ~/.cloudtek/configs/aws.yaml on first configure run.

region: us-east-1
instance_type: t3.medium
disk_size: 50
vpc_id: YOUR_VPC_ID
security_group_id: YOUR_SECURITY_GROUP_ID
subnet_id: default
no_backups: true

credentials_env:
  access_key: AWS_ACCESS_KEY_ID
  secret_key: AWS_SECRET_ACCESS_KEY
ssh_key_env: AWS_SSH_PRIVATE_KEY

profiles:
  debian:
    ssh_user: YOUR_SSH_USER
    tags:
      - test-debian-vm
  flatcar:
    ssh_user: core
    tags:
      - test-flatcar-vm

image_prefixes:
  example-service: example-prefix

service_profiles:
  example-service: debian
