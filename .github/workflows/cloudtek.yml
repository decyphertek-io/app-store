name: Build Cloudtek

on:
  push:
    branches:
      - main
    paths:
      - 'cloudtek/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get next version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list --repo ${{ github.repository }} --limit 50 \
            | grep "^cloudtek-v" | awk '{print $1}' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="cloudtek-v1.0.0"
          else
            PATCH=$(echo $LATEST | awk -F. '{print $NF}')
            BASE=$(echo $LATEST | awk -F. '{OFS="."; $NF=""; NF--; print}')
            NEXT="${BASE}.$((PATCH+1))"
          fi
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "old=$LATEST" >> $GITHUB_OUTPUT

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build
        working-directory: ./cloudtek
        run: |
          set -e
          uv venv --clear --python 3.12
          source .venv/bin/activate
          uv pip install pyinstaller pyyaml apache-libcloud
          rm -rf dist build *.spec
          pyinstaller --onefile \
            --name cloudtek.apps \
            --add-data "configs:configs" \
            --hidden-import=libcloud.compute.drivers.gce \
            --hidden-import=libcloud.compute.drivers.ec2 \
            --hidden-import=libcloud.compute.drivers.azure_arm \
            --hidden-import=libcloud.common.google \
            --hidden-import=libcloud.common.aws \
            --hidden-import=libcloud.common.azure_arm \
            --clean \
            cloudtek.py
          rm -rf .venv build
          find . -maxdepth 1 -name "*.spec" -delete

      - name: Create new release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            cloudtek/dist/cloudtek.apps \
            --repo ${{ github.repository }} \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Auto-built from main (cloudtek)."

      - name: Delete old release
        if: ${{ steps.version.outputs.old != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.version.outputs.old }}" \
            --repo ${{ github.repository }} \
            --yes \
            --cleanup-tag
