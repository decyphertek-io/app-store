apps:
  chromadb:
    id: chromadb
    version: "1.0.0"
    repo_url: https://github.com/decyphertek-io/app-store
    folder_path: chromadb/
    executable: dist/chromadb.apps
    release_url: https://github.com/decyphertek-io/app-store/releases/download/chromadb-v1.0.0/chromadb.apps
    config: cdb-config.yaml
    config_path: ~/.decyphertek.ai/configs/
    install_path: ~/.decyphertek.ai/app-store/chromadb/
    enabled: true

  argostranslate:
    id: argostranslate
    version: "1.0.0"
    repo_url: https://github.com/decyphertek-io/app-store
    folder_path: argostranslate/
    executable: dist/argostranslate.apps
    release_url: https://github.com/decyphertek-io/app-store/releases/download/argostranslate-v1.0.0/argostranslate.apps
    install_path: ~/.decyphertek.ai/app-store/argostranslate/
    enabled: false

  cloudtek:
    id: cloudtek
    version: "1.0.0"
    repo_url: https://github.com/decyphertek-io/app-store
    folder_path: cloudtek/
    executable: dist/cloudtek.apps
    release_url: https://github.com/decyphertek-io/app-store/releases/download/cloudtek-v1.0.0/cloudtek.apps
    install_path: ~/.decyphertek.ai/app-store/cloudtek/
    enabled: false
